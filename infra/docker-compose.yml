services:
  postgres:
    image: postgres:16-alpine
    container_name: ecoh-postgres
    environment:
      POSTGRES_USER: ecoh
      POSTGRES_PASSWORD: ecoh
      POSTGRES_DB: ecoh_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoh -d ecoh_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ecoh-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecoh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Aplicación ───────────────────────────────────────────────────────────────

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: ecoh-api
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      NODE_ENV: production
      PORT: 8003
      DATABASE_URL: postgres://ecoh:ecoh@postgres:5432/ecoh_dev
      JWT_SECRET: ${JWT_SECRET:-cambia_este_secreto_en_produccion}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3004}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8003}
    container_name: ecoh-web
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  redis_data:
